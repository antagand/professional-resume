services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: test
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass

  adminer:
    image: adminer:5
    container_name: adminer
    ports:
      - "8082:8080"
    depends_on:
      - mysql
